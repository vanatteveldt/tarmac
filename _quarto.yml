project:
  type: book
  output-dir: _book

book:
  title: "Text Analysis in R for Media and Communication"
  author: "Your Name"
  date: today
  date-format: "YYYY"
  repo-url: https://github.com/vanatteveldt/tarmac
  repo-actions: [edit, issue]
  chapters:
    - index.qmd
    - part: "Foundations"
      chapters:
        - chapters/01-introduction.qmd
        - chapters/02-getting-started.qmd
        - chapters/03-data-collection.qmd
    - part: "Core Methods"
      chapters:
        - chapters/04-preprocessing.qmd
        - chapters/05-exploratory.qmd
        - chapters/06-sentiment.qmd
    - part: "Advanced Topics"
      chapters:
        - chapters/07-topic-modeling.qmd
        - chapters/08-content-analysis.qmd
        - chapters/09-word-embeddings.qmd
    - chapters/references.qmd

bibliography: references.bib

format:
  html:
    theme:
      light: flatly
      dark: darkly
    code-link: true
    toc: true
    toc-depth: 3
    number-sections: true
    fig-align: center
    fig-dpi: 150
    highlight-style: github

filters:
  - live

webr:
  packages:
    - tidyverse
    - tidytext
    - quanteda
    - scales
    - ggwordcloud

execute:
  freeze: auto
  echo: true
  warning: false
  message: false
