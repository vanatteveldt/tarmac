    "future": {
      "Package": "future",
      "Version": "1.33.1",
      "Source": "Repository",
      "Title": "Unified Parallel and Distributed Processing in R for Everyone",
      "Imports": [
        "digest",
        "globals (>= 0.16.1)",
        "listenv (>= 0.8.0)",
        "parallel",
        "parallelly (>= 1.34.0)",
